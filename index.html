<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HTTN TTHC – Prototype | Cục Hải quan</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono&display=swap" rel="stylesheet">
<style>
:root {
  --primary: #0b3d91;
  --primary-dark: #072b68;
  --primary-light: #1e5ec7;
  --accent: #d4a017;
  --bg: #f5f7fb;
  --surface: #ffffff;
  --border: #e2e8f0;
  --text: #0f172a;
  --text-muted: #64748b;
  --success: #059669;
  --warning: #d97706;
  --error: #dc2626;
  --info: #0284c7;
  --radius: 8px;
  --shadow-sm: 0 1px 2px rgba(0,0,0,0.04);
  --shadow: 0 4px 12px rgba(11,61,145,0.08);
  --shadow-lg: 0 10px 30px rgba(11,61,145,0.12);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Inter', -apple-system, system-ui, sans-serif;
  font-size: 14px;
  line-height: 1.5;
  color: var(--text);
  background: var(--bg);
  -webkit-font-smoothing: antialiased;
}

/* ===== LAYOUT ===== */
.app { display: flex; min-height: 100vh; }

/* ===== SIDEBAR ===== */
.sidebar {
  width: 260px;
  background: linear-gradient(180deg, var(--primary-dark) 0%, var(--primary) 100%);
  color: #e2e8f0;
  display: flex; flex-direction: column;
  position: fixed; left: 0; top: 0; bottom: 0;
}
.logo {
  padding: 20px 20px 16px;
  border-bottom: 1px solid rgba(255,255,255,0.1);
  display: flex; gap: 12px; align-items: center;
}
.logo-mark {
  width: 40px; height: 40px;
  background: var(--accent);
  border-radius: var(--radius);
  display: grid; place-items: center;
  font-weight: 800; color: var(--primary-dark);
  font-size: 16px;
}
.logo-text h1 { font-size: 14px; font-weight: 700; color: #fff; letter-spacing: 0.3px; }
.logo-text p { font-size: 11px; color: rgba(255,255,255,0.7); }

.nav { flex: 1; overflow-y: auto; padding: 12px 0; }
.nav-section { padding: 8px 20px 4px; font-size: 10px; font-weight: 600; text-transform: uppercase; color: rgba(255,255,255,0.5); letter-spacing: 0.8px; }
.nav-item {
  display: flex; align-items: center; gap: 12px;
  padding: 10px 20px; cursor: pointer;
  font-size: 13px; color: rgba(255,255,255,0.85);
  border-left: 3px solid transparent;
  transition: all 0.15s;
}
.nav-item:hover { background: rgba(255,255,255,0.06); color: #fff; }
.nav-item.active { background: rgba(255,255,255,0.1); color: #fff; border-left-color: var(--accent); font-weight: 600; }
.nav-icon { width: 18px; height: 18px; opacity: 0.9; }

.user-box {
  padding: 14px 20px;
  border-top: 1px solid rgba(255,255,255,0.1);
  display: flex; align-items: center; gap: 10px;
}
.avatar { width: 34px; height: 34px; border-radius: 50%; background: var(--accent); display: grid; place-items: center; color: var(--primary-dark); font-weight: 700; font-size: 13px; }
.user-meta { flex: 1; }
.user-meta .name { font-size: 12px; color: #fff; font-weight: 600; }
.user-meta .role { font-size: 10px; color: rgba(255,255,255,0.6); }

/* ===== MAIN ===== */
.main { flex: 1; margin-left: 260px; display: flex; flex-direction: column; }
.topbar {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 14px 28px;
  display: flex; justify-content: space-between; align-items: center;
  position: sticky; top: 0; z-index: 10;
}
.crumb { font-size: 13px; color: var(--text-muted); }
.crumb strong { color: var(--text); }
.topbar-actions { display: flex; gap: 8px; align-items: center; }

.content { padding: 24px 28px; max-width: 1400px; width: 100%; }

/* ===== CARDS & HEADINGS ===== */
.page-header {
  display: flex; justify-content: space-between; align-items: flex-start;
  margin-bottom: 20px;
}
.page-title { font-size: 22px; font-weight: 700; color: var(--text); margin-bottom: 4px; }
.page-subtitle { font-size: 13px; color: var(--text-muted); }

.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  box-shadow: var(--shadow-sm);
  overflow: hidden;
  margin-bottom: 20px;
}
.card-header {
  padding: 14px 18px;
  border-bottom: 1px solid var(--border);
  display: flex; justify-content: space-between; align-items: center;
  background: #fafbfc;
}
.card-title { font-size: 14px; font-weight: 600; color: var(--text); }
.card-body { padding: 18px; }

/* ===== KPIS ===== */
.kpis { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; margin-bottom: 20px; }
.kpi {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px;
  position: relative;
  overflow: hidden;
}
.kpi::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
  background: var(--primary);
}
.kpi.success::before { background: var(--success); }
.kpi.warning::before { background: var(--warning); }
.kpi.info::before { background: var(--info); }
.kpi-label { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; font-weight: 500; }
.kpi-value { font-size: 24px; font-weight: 700; color: var(--text); }
.kpi-delta { font-size: 11px; margin-top: 4px; }
.kpi-delta.up { color: var(--success); }
.kpi-delta.down { color: var(--error); }

/* ===== TABLE ===== */
.table { width: 100%; border-collapse: collapse; }
.table th {
  text-align: left;
  padding: 10px 14px;
  font-size: 11px; font-weight: 600;
  color: var(--text-muted);
  background: #fafbfc;
  border-bottom: 1px solid var(--border);
  text-transform: uppercase; letter-spacing: 0.5px;
}
.table td {
  padding: 12px 14px;
  border-bottom: 1px solid var(--border);
  font-size: 13px;
  vertical-align: middle;
}
.table tr:hover td { background: #fafbfc; cursor: pointer; }
.table tr:last-child td { border-bottom: none; }

/* ===== BADGES ===== */
.badge {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 2px 8px;
  border-radius: 100px;
  font-size: 11px; font-weight: 500;
}
.badge.success { background: #dcfce7; color: #166534; }
.badge.warning { background: #fef3c7; color: #92400e; }
.badge.error { background: #fee2e2; color: #991b1b; }
.badge.info { background: #dbeafe; color: #1e3a8a; }
.badge.muted { background: #f1f5f9; color: #475569; }
.badge-dot { width: 6px; height: 6px; border-radius: 50%; display: inline-block; }

/* ===== BUTTONS ===== */
.btn {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 8px 14px;
  font-size: 13px; font-weight: 500;
  border: 1px solid var(--border);
  border-radius: 6px;
  background: var(--surface);
  color: var(--text);
  cursor: pointer;
  transition: all 0.15s;
  font-family: inherit;
}
.btn:hover { background: #f1f5f9; }
.btn-primary { background: var(--primary); color: #fff; border-color: var(--primary); }
.btn-primary:hover { background: var(--primary-dark); }
.btn-accent { background: var(--accent); color: var(--primary-dark); border-color: var(--accent); font-weight: 600; }
.btn-sm { padding: 5px 10px; font-size: 12px; }
.btn-ghost { border: none; background: transparent; color: var(--primary); padding: 4px 8px; }

/* ===== FORMS ===== */
.form-row { display: grid; grid-template-columns: repeat(2, 1fr); gap: 14px; margin-bottom: 14px; }
.form-row.full { grid-template-columns: 1fr; }
.form-group label {
  display: block;
  font-size: 12px; font-weight: 500;
  color: var(--text); margin-bottom: 5px;
}
.form-group .req { color: var(--error); }
.form-control {
  width: 100%;
  padding: 9px 12px;
  font-size: 13px;
  border: 1px solid var(--border);
  border-radius: 6px;
  font-family: inherit;
  transition: border 0.15s;
}
.form-control:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(11,61,145,0.1); }
.form-control[readonly], .form-control:disabled { background: #f8fafc; color: var(--text-muted); }
textarea.form-control { min-height: 80px; resize: vertical; font-family: inherit; }
.hint { font-size: 11px; color: var(--text-muted); margin-top: 4px; }

/* ===== TABS ===== */
.tabs { display: flex; gap: 0; border-bottom: 1px solid var(--border); margin-bottom: 16px; }
.tab {
  padding: 10px 16px;
  cursor: pointer;
  font-size: 13px; font-weight: 500;
  color: var(--text-muted);
  border-bottom: 2px solid transparent;
  transition: all 0.15s;
}
.tab:hover { color: var(--text); }
.tab.active { color: var(--primary); border-bottom-color: var(--primary); font-weight: 600; }

/* ===== MODAL ===== */
.modal-overlay {
  position: fixed; inset: 0;
  background: rgba(15,23,42,0.5);
  display: none; place-items: center;
  z-index: 100;
  padding: 20px;
}
.modal-overlay.show { display: grid; }
.modal {
  background: var(--surface);
  border-radius: var(--radius);
  box-shadow: var(--shadow-lg);
  width: 100%; max-width: 720px;
  max-height: 90vh;
  display: flex; flex-direction: column;
  overflow: hidden;
}
.modal-header {
  padding: 16px 20px;
  border-bottom: 1px solid var(--border);
  display: flex; justify-content: space-between; align-items: center;
}
.modal-title { font-size: 15px; font-weight: 600; }
.modal-close { cursor: pointer; background: none; border: none; font-size: 20px; color: var(--text-muted); }
.modal-body { padding: 20px; overflow-y: auto; flex: 1; }
.modal-footer {
  padding: 14px 20px;
  border-top: 1px solid var(--border);
  display: flex; gap: 8px; justify-content: flex-end;
  background: #fafbfc;
}

/* ===== SCHEMA BUILDER ===== */
.field-list { display: flex; flex-direction: column; gap: 8px; }
.field-item {
  display: grid;
  grid-template-columns: 30px 2fr 1.5fr 1fr 90px 60px 40px;
  gap: 8px;
  align-items: center;
  padding: 10px;
  background: #fafbfc;
  border: 1px solid var(--border);
  border-radius: 6px;
}
.field-item.header {
  background: #fff;
  border: none;
  padding: 0 10px;
  font-size: 11px;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  font-weight: 600;
}
.drag-handle { cursor: grab; color: var(--text-muted); text-align: center; font-size: 14px; }
.field-input { padding: 6px 10px; font-size: 12px; border: 1px solid var(--border); border-radius: 4px; width: 100%; }
.field-select { padding: 6px 8px; font-size: 12px; border: 1px solid var(--border); border-radius: 4px; width: 100%; background: #fff; }
.checkbox { width: 16px; height: 16px; cursor: pointer; }

/* ===== JSON PREVIEW ===== */
.json-preview {
  background: #0f172a;
  color: #e2e8f0;
  padding: 16px;
  border-radius: 6px;
  font-family: 'JetBrains Mono', 'Courier New', monospace;
  font-size: 12px;
  line-height: 1.6;
  overflow-x: auto;
  white-space: pre;
  max-height: 400px;
  overflow-y: auto;
}
.json-key { color: #93c5fd; }
.json-string { color: #fde68a; }
.json-number { color: #a7f3d0; }
.json-bool { color: #f9a8d4; }

/* ===== RENDERED FORM ===== */
.rendered-form {
  background: #f8fafc;
  border: 1px dashed #cbd5e1;
  padding: 18px;
  border-radius: 6px;
}
.rendered-title { font-size: 13px; font-weight: 600; margin-bottom: 14px; color: var(--primary); display: flex; align-items: center; gap: 8px; }

/* ===== PROGRESS ===== */
.progress { height: 6px; background: #e2e8f0; border-radius: 3px; overflow: hidden; }
.progress-bar { height: 100%; background: var(--primary); border-radius: 3px; transition: width 0.3s; }

/* ===== EMPTY / INFO ===== */
.empty { padding: 40px; text-align: center; color: var(--text-muted); font-size: 13px; }
.info-banner {
  background: #eff6ff;
  border-left: 3px solid var(--primary);
  padding: 10px 14px;
  border-radius: 4px;
  font-size: 12px;
  color: #1e3a8a;
  margin-bottom: 14px;
}

/* ===== UTIL ===== */
.flex { display: flex; }
.gap-8 { gap: 8px; } .gap-12 { gap: 12px; }
.mb-16 { margin-bottom: 16px; }
.text-muted { color: var(--text-muted); }
.text-sm { font-size: 12px; }
.mono { font-family: 'JetBrains Mono', monospace; font-size: 12px; }

@media (max-width: 900px) {
  .sidebar { width: 80px; }
  .sidebar .logo-text, .sidebar .nav-section, .sidebar .user-meta, .sidebar .nav-item span { display: none; }
  .main { margin-left: 80px; }
  .nav-item { justify-content: center; }
  .kpis { grid-template-columns: repeat(2, 1fr); }
  .form-row { grid-template-columns: 1fr; }
}
</style>
</head>

<script>
// ============== DATA MODEL ==============
// 18 thủ tục – mỗi thủ tục 1 tờ khai – tờ khai gồm nhiều chứng từ
const PROCEDURES = [

  { code: 'TTHQ-003', name: 'Tờ khai hải quan quá cảnh', group: 'Thủ tục HQ', cert_count: 5, status: 'active' },

  { code: 'MGHT-001', name: 'Hồ sơ miễn thuế xuất/nhập khẩu', group: 'Miễn/Giảm thuế', cert_count: 6, status: 'active' },
  { code: 'MGHT-002', name: 'Hồ sơ giảm thuế xuất/nhập khẩu', group: 'Miễn/Giảm thuế', cert_count: 5, status: 'active' },
  { code: 'MGHT-003', name: 'Hồ sơ hoàn thuế xuất/nhập khẩu', group: 'Miễn/Giảm thuế', cert_count: 7, status: 'active' },
  { code: 'MGHT-004', name: 'Hồ sơ không thu thuế', group: 'Miễn/Giảm thuế', cert_count: 4, status: 'active' },
  { code: 'MGHT-005', name: 'Miễn thuế hàng hóa của người xuất cảnh', group: 'Miễn/Giảm thuế', cert_count: 3, status: 'draft' },
  { code: 'CHMT-001', name: 'Đăng ký cửa hàng miễn thuế', group: 'Cửa hàng miễn thuế', cert_count: 5, status: 'active' },
  { code: 'CHMT-002', name: 'Tiếp nhận hồ sơ nhập hàng cửa hàng miễn thuế', group: 'Cửa hàng miễn thuế', cert_count: 4, status: 'active' },
  { code: 'NSNN-001', name: 'Nộp thuế xuất/nhập khẩu qua Cổng thanh toán', group: 'Nộp NSNN', cert_count: 3, status: 'active' },
  { code: 'NSNN-002', name: 'Nộp lệ phí, tiền phạt, bảo lãnh thuế', group: 'Nộp NSNN', cert_count: 3, status: 'active' },

];

// Field schema cho 1 chứng từ (cấu hình động)
const FIELD_TYPES = [
  { value: 'text', label: 'Văn bản' },
  { value: 'number', label: 'Số' },
  { value: 'date', label: 'Ngày' },
  { value: 'select', label: 'Danh sách' },

  { value: 'file', label: 'Tệp đính kèm' }

// Sample schema - Chứng từ "Thông tin tờ khai hàng nhập khẩu"
let currentSchema = {
  cert_code: 'IMPDEC-01',
  cert_name: 'Thông tin tờ khai hàng nhập khẩu',
  version: '1.2',
  procedure: 'TTHQ-001',
  fields: [
    { id: 'f1', name: 'ma_to_khai', label: 'Mã tờ khai', type: 'text', required: true, maxLength: 20, placeholder: 'VD: 10012345678' },
    { id: 'f2', name: 'ngay_dang_ky', label: 'Ngày đăng ký', type: 'date', required: true },
    { id: 'f3', name: 'loai_hinh', label: 'Loại hình XNK', type: 'select', required: true, options: 'A11 - Nhập KD tiêu dùng\nA12 - Nhập KD sản xuất\nA41 - Nhập kinh doanh chuyển đổi' },

function renderFieldRow(f) {
  return `
    <div class="field-item" data-id="${f.id}">
      <span class="drag-handle">⋮⋮</span>
      <input class="field-input mono" value="${f.name}" onchange="updateField('${f.id}','name',this.value)">
      <input class="field-input" value="${f.label}" onchange="updateField('${f.id}','label',this.value)">
      <select class="field-select" onchange="updateField('${f.id}','type',this.value)">
        ${FIELD_TYPES.map(t => `<option value="${t.value}" ${t.value === f.type ? 'selected' : ''}>${t.label}</option>`).join('')}
      </select>
      <input class="field-input" placeholder="regex/max..." value="${f.pattern || f.maxLength || ''}" onchange="updateField('${f.id}','validation',this.value)">
      <label style="display:grid;place-items:center">
        <input type="checkbox" class="checkbox" ${f.required ? 'checked' : ''} onchange="updateField('${f.id}','required',this.checked)">
      </label>
      <button class="btn btn-sm btn-ghost" style="color:var(--error)" onclick="removeField('${f.id}')">🗑</button>
    </div>
  `;
}

function updateField(id, key, val) {
  const f = currentSchema.fields.find(x => x.id === id);
  if (!f) return;
  f[key] = val;
  refreshPreview();
}

function addField() {
  const id = 'f' + (currentSchema.fields.length + 1 + Math.floor(Math.random() * 100));
  currentSchema.fields.push({
    id, name: 'truong_moi', label: 'Trường mới', type: 'text', required: false
  });
  document.getElementById('field-list').insertAdjacentHTML('beforeend', renderFieldRow(currentSchema.fields[currentSchema.fields.length - 1]));
  refreshPreview();
}

function removeField(id) {
  currentSchema.fields = currentSchema.fields.filter(f => f.id !== id);
  document.querySelector(`[data-id="${id}"]`)?.remove();
  refreshPreview();
}

function switchPreview(tab, mode) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  tab.classList.add('active');
  document.getElementById('preview-body').innerHTML = mode === 'form' ? renderFormPreview() : renderJsonPreview();
}

function refreshPreview() {
  const active = document.querySelector('.tab.active')?.textContent || '';
  const mode = active.includes('JSON') ? 'json' : 'form';
  const pb = document.getElementById('preview-body');
  if (pb) pb.innerHTML = mode === 'form' ? renderFormPreview() : renderJsonPreview();
}

function renderFormPreview() {
  return `
    <div class="rendered-form">
      <div class="rendered-title">📄 ${currentSchema.cert_name} <span class="badge muted">Preview</span></div>
      ${currentSchema.fields.map(f => renderFieldInput(f)).join('')}
      <div style="margin-top:14px;display:flex;gap:8px">
        <button class="btn btn-primary btn-sm">Gửi</button>
        <button class="btn btn-sm">Hủy</button>
      </div>
    </div>
  `;
}

function renderFieldInput(f) {
  const req = f.required ? '<span class="req">*</span>' : '';
  let input = '';
  switch (f.type) {
    case 'textarea':
      input = `<textarea class="form-control" placeholder="${f.placeholder || ''}"></textarea>`; break;
    case 'select':
      const opts = (f.options || '').split('\n').filter(Boolean);
      input = `<select class="form-control"><option value="">-- Chọn --</option>${opts.map(o => `<option>${o}</option>`).join('')}</select>`; break;
    case 'checkbox':
      input = `<label style="display:flex;align-items:center;gap:8px"><input type="checkbox" class="checkbox"> ${f.label}</label>`;
      return `<div class="form-group" style="margin-bottom:12px">${input}</div>`;
    case 'file':
      input = `<input class="form-control" type="file" ${f.multiple ? 'multiple' : ''}>`; break;
    case 'date':
      input = `<input class="form-control" type="date">`; break;
    case 'number':
      input = `<input class="form-control" type="number" placeholder="${f.placeholder || ''}">`; break;
    default:
      input = `<input class="form-control" type="text" placeholder="${f.placeholder || ''}">`;
  }
  return `<div class="form-group" style="margin-bottom:12px"><label>${f.label} ${req}</label>${input}</div>`;
}

function renderJsonPreview() {
  const schema = {
    $schema: 'http://json-schema.org/draft-07/schema#',
    certificate: {
      code: currentSchema.cert_code,
      name: currentSchema.cert_name,
      version: currentSchema.version,
      procedure: currentSchema.procedure
    },
    type: 'object',
    required: currentSchema.fields.filter(f => f.required).map(f => f.name),
    properties: currentSchema.fields.reduce((acc, f) => {
      const p = { type: f.type === 'number' ? 'number' : 'string', title: f.label };
      if (f.pattern) p.pattern = f.pattern;
      if (f.maxLength) p.maxLength = Number(f.maxLength);
      if (f.type === 'date') p.format = 'date';
      if (f.type === 'select' && f.options) p.enum = f.options.split('\n').filter(Boolean);
      acc[f.name] = p;
      return acc;
    }, {})
  };
  return `<div class="json-preview">${syntaxHighlight(JSON.stringify(schema, null, 2))}</div>`;
}

function syntaxHighlight(json) {
  return json
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/("(?:\\.|[^"\\])*")(\s*:)?/g, (m, p1, p2) => p2 ? `<span class="json-key">${p1}</span>${p2}` : `<span class="json-string">${p1}</span>`)
    .replace(/\b(true|false|null)\b/g, '<span class="json-bool">$1</span>')
    .replace(/(-?\d+\.?\d*)/g, '<span class="json-number">$1</span>');
}

function renderMonitoring() {
  setCrumb('Giám sát', 'API Log');

    const endpoints = ['/api/v1/submissions', '/api/v1/verify-signature', '/api/v1/route-message', '/api/v1/response', '/api/v1/query/status'];
    const codes = [200, 200, 200, 200, 200, 400, 500, 401];
    const code = codes[Math.floor(Math.random() * codes.length)];
    return {
      time: `21/04/2026 14:${String(20 + i).padStart(2, '0')}:${String(Math.floor(Math.random()*60)).padStart(2, '0')}`,
      method: ['POST', 'POST', 'GET', 'POST'][Math.floor(Math.random() * 4)],
      endpoint: endpoints[Math.floor(Math.random() * endpoints.length)],
      code,
      latency: `${(Math.random() * 3).toFixed(2)}s`,
      client: `Cty TNHH ${String.fromCharCode(65 + i % 26)}`
    };
  });
  const html = `
    <div class="page-header">
      <div>
        <div class="page-title">Giám sát API Log</div>
        <div class="page-subtitle">Nhật ký thời gian thực 3 luồng: Tiếp nhận / Phản hồi / Định tuyến</div>
      </div>
    </div>
    <div class="kpis">
      <div class="kpi info"><div class="kpi-label">Tổng API call (1h)</div><div class="kpi-value">48,291</div></div>
      <div class="kpi success"><div class="kpi-label">2xx Success</div><div class="kpi-value">99.6%</div></div>
      <div class="kpi warning"><div class="kpi-label">4xx Client Error</div><div class="kpi-value">0.3%</div></div>
      <div class="kpi" style="--primary:#dc2626"><div class="kpi-label">5xx Server Error</div><div class="kpi-value">0.1%</div></div>
    </div>
    <div class="card">
      <table class="table">
        <thead><tr><th>Thời gian</th><th>Method</th><th>Endpoint</th><th>Status</th><th>Latency</th><th>Client</th></tr></thead>
        <tbody>
          ${logs.map(l => `<tr>
            <td class="mono text-sm">${l.time}</td>
            <td><span class="badge ${l.method === 'POST' ? 'info' : 'muted'}">${l.method}</span></td>

// ============== UTILITY ==============
function setContent(html) { document.getElementById('content').innerHTML = html; }
function setCrumb(...parts) {
  document.getElementById('crumb').innerHTML = parts.map((p, i) => i === parts.length - 1 ? `<strong>${p}</strong>` : p).join(' / ');
}

function openModal(title, body, actions) {
  document.getElementById('modal-title').textContent = title;
  document.getElementById('modal-body').innerHTML = body;
  document.getElementById('modal-footer').innerHTML = actions.map(a => `<button class="${a.cls}" onclick="${a.onclick}">${a.label}</button>`).join('');
  document.getElementById('modal').classList.add('show');
}
function closeModal() { document.getElementById('modal').classList.remove('show'); }
